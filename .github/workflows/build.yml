name: Gradle Build
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDKs (21 launcher + 25 toolchain)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # 25 is listed first so 21 (last) becomes the default JAVA_HOME / Gradle launcher; the
          # Fabric preprocessor only runs under 21, while the 26.1+ targets use the 25 toolchain.
          java-version: |
            25
            21
          cache: gradle
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build --no-daemon
      - name: Upload to storage server
        env:
          STORAGE_TOKEN: ${{ secrets.ARTIFACT_STORAGE_TOKEN }}
        run: |
          for file in build/libs/*.jar; do
            curl -X POST \
              -H "Authorization: Bearer $STORAGE_TOKEN" \
              -H "X-Filename: $(basename $file)" \
              --data-binary @"$file" \
              https://artifact-storage.nightrider-eda.workers.dev/upload
          done
        if: always()
