name: PR Tests

on:
  pull_request:
    branches: [ 'master' ]

permissions:
  contents: read
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout for CI 🛎'
        uses: actions/checkout@v6
      - name: 'Set up JDKs (21 launcher + 25 toolchain) 📦'
        uses: actions/setup-java@v5
        with:
          # 25 first so 21 (last) is the default JAVA_HOME / Gradle launcher (required by the Fabric
          # preprocessor); the 26.1+ targets compile against the 25 toolchain.
          java-version: |
            25
            21
          distribution: 'temurin'
      - name: 'Build with Gradle 🏗️'
        uses: gradle/gradle-build-action@v3
        with:
          arguments: test
      - name: 'Publish Test Report 📊'
        uses: mikepenz/action-junit-report@v6
        if: success() || failure() # Continue on failure
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'